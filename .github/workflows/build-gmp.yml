name: Build GMP

on:
  push:
    branches: [test/winrepro]
  workflow_dispatch:
    inputs:
      create-pr:
        description: Create a pull request
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

env:
  RETENTION: 7

jobs:
  

  build-windows:
    name: Windows build
    strategy:
      matrix:
        arch: [x64]
    runs-on: ${{ matrix.arch == 'arm64' && 'windows-11-arm' || 'windows-latest' }}
    steps:
      - name: Disable line ending conversion
        run: git config --global core.autocrlf input

      - name: Check out gmp-6.3 repository
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: ${{ matrix.arch == 'arm64' && 'clangarm64' || 'clang64' }}
          install: >-
            autoconf automake base-devel git libtool
            ${{ matrix.arch == 'arm64' && 'mingw-w64-clang-aarch64-toolchain' || 'mingw-w64-clang-x86_64-toolchain' }}

      - name: Build
        shell: msys2 {0}
        run: |
          export SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)
          export BUILD_PATH_PREFIX_MAP="$PWD=."
          export LDFLAGS="$LDFLAGS -Wl,--build-id=none"
          export CFLAGS="$CFLAGS -fdebug-prefix-map=$PWD=."
          ./.bootstrap
          echo $CFLAGS
          echo $LDFLAGS
          ./configure \
            --disable-static \
            --enable-shared \
            ${{ matrix.arch == 'arm64' && '--disable-assembly' || '' }}
          make -j$(nproc)
          ##make check
          #strip .libs/libgmp-10.dll
          #mv .libs/libgmp-10.dll .libs/gmp.dll
          #sha256sum .libs/gmp.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-${{ matrix.arch }}
          path: .libs
          retention-days: ${{ env.RETENTION }}
          if-no-files-found: error

